<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Reproduction Visualization</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; color: #ffffff; font-family: Arial, sans-serif; }
       .info-panel { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 5px; cursor: pointer; }
       .info-panel:hover .info-content { display: block; }
       .info-content { display: none; padding: 10px; background: rgba(0, 0, 0, 0.7); border-radius: 5px; }
       .label { position: absolute; color: #00f3ff; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="info-panel">
        <div>ℹ️ Info</div>
        <div class="info-content">
            <p>This visualization demonstrates the process of cell reproduction.</p>
            <p>Drag to rotate • Scroll to zoom • Click objects for info</p>
        </div>
    </div>
    <div class="label" id="cellLabel" style="top: 10px; left: 10px;">Cell</div>
    <div class="label" id="nucleusLabel" style="top: 50px; left: 100px;">Nucleus</div>
    <div class="label" id="chromosomeLabel" style="top: 100px; left: 200px;">Chromosome</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls, cell, nucleus, chromosome;
        let labels = { cell: null, nucleus: null, chromosome: null };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5).normalize();
            scene.add(directionalLight);

            cell = createCell();
            nucleus = createNucleus();
            chromosome = createChromosome();

            scene.add(cell);
            cell.add(nucleus);
            nucleus.add(chromosome);

            controls = {
                rotate: false,
                x: 0,
                y: 0,
                offsetX: 0,
                offsetY: 0
            };

            window.addEventListener('mousedown', onMouseDown, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('mouseup', onMouseUp, false);
            window.addEventListener('wheel', onMouseWheel, false);
            window.addEventListener('click', onClick, false);
            window.addEventListener('resize', onWindowResize, false);

            onWindowResize();
            animate();
        }

        function createCell() {
            const geometry = new THREE.SphereGeometry(5, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(0, 0, 0);
            labels.cell = addLabel(mesh, "Cell", 10, 10);
            return mesh;
        }

        function createNucleus() {
            const geometry = new THREE.SphereGeometry(2, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xa855f7, wireframe: true });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(3, 0, 0);
            labels.nucleus = addLabel(mesh, "Nucleus", 100, 100);
            return mesh;
        }

        function createChromosome() {
            const geometry = new THREE.BoxGeometry(1, 1, 0.2);
            const material = new THREE.MeshBasicMaterial({ color: 0xff006e, wireframe: true });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(0.5, 0, 0);
            labels.chromosome = addLabel(mesh, "Chromosome", 200, 150);
            return mesh;
        }

        function addLabel(mesh, text, x, y) {
            const div = document.createElement('div');
            div.className = 'label';
            div.id = text.toLowerCase().replace(' ', '');
            div.style.top = y + 'px';
            div.style.left = x + 'px';
            div.textContent = text;
            document.body.appendChild(div);
            return { mesh, div };
        }

        function onMouseDown(event) {
            controls.rotate = true;
            controls.offsetX = event.clientX;
            controls.offsetY = event.clientY;
        }

        function onMouseMove(event) {
            if (controls.rotate) {
                camera.position.x += (event.clientX - controls.offsetX) * 0.01;
                camera.position.y -= (event.clientY - controls.offsetY) * 0.01;
                controls.offsetX = event.clientX;
                controls.offsetY = event.clientY;
            }
        }

        function onMouseUp() {
            controls.rotate = false;
        }

        function onMouseWheel(event) {
            const zoom = event.deltaY > 0 ? 1.1 : 0.9;
            camera.scale.x *= zoom;
            camera.scale.y *= zoom;
            camera.scale.z *= zoom;
            camera.updateProjectionMatrix();
        }

        function onClick(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(scene.children);
            if (intersects.length > 0) {
                const intersectedObject = intersects[0].object;
                for (const key in labels) {
                    if (labels[key].mesh === intersectedObject) {
                        labels[key].div.style.display = 'block';
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            cell.rotation.y += 0.005;
            nucleus.rotation.x += 0.01;
            chromosome.rotation.z += 0.02;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
