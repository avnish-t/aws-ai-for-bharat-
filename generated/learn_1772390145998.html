<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Mutations Visualization</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: Arial, sans-serif; }
        #infoPanel { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 5px; color: #00f3ff; cursor: pointer; z-index: 10; }
        #infoPanel:hover #infoContent { display: block; }
        #infoContent { display: none; position: absolute; top: 35px; left: 10px; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px; color: #fff; }
       .tooltip { position: absolute; background: rgba(0, 0, 0, 0.7); padding: 5px; border-radius: 5px; color: #fff; display: none; }
    </style>
</head>
<body>
    <div id="infoPanel">ℹ️ Info</div>
    <div id="infoContent">
        <p>This visualization demonstrates cell mutations. Drag to rotate, scroll to zoom, and click objects for more info.</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let objects = [];
        let selectedObject = null;

        init();
        animate();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            controls = {
                rotateLeft: false,
                rotateUp: false
            };

            window.addEventListener('mousedown', onMouseDown, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('mouseup', onMouseUp, false);
            window.addEventListener('wheel', onMouseWheel, false);
            window.addEventListener('click', onClick, false);
            window.addEventListener('resize', onWindowResize, false);

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7.5).normalize();
            scene.add(directionalLight);

            createObjects();
        }

        function createObjects() {
            const cellGeometry = new THREE.SphereGeometry(1, 32, 32);
            const cellMaterial = new THREE.MeshBasicMaterial({ color: 0x00f3ff });
            const cell = new THREE.Mesh(cellGeometry, cellMaterial);
            cell.position.set(0, 0, 0);
            scene.add(cell);
            objects.push({ mesh: cell, label: "Healthy Cell" });

            const mutationGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const mutationMaterial = new THREE.MeshBasicMaterial({ color: 0xff006e });
            const mutation = new THREE.Mesh(mutationGeometry, mutationMaterial);
            mutation.position.set(2, 1, 0);
            scene.add(mutation);
            objects.push({ mesh: mutation, label: "Cell Mutation" });

            const nucleusGeometry = new THREE.SphereGeometry(0.7, 32, 32);
            const nucleusMaterial = new THREE.MeshBasicMaterial({ color: 0xa855f7 });
            const nucleus = new THREE.Mesh(nucleusGeometry, nucleusMaterial);
            nucleus.position.set(-2, 1, 0);
            scene.add(nucleus);
            objects.push({ mesh: nucleus, label: "Cell Nucleus" });
        }

        function onMouseDown(event) {
            event.preventDefault();
            controls.rotateLeft = event.button === 0;
            controls.rotateUp = event.button === 2;
        }

        function onMouseMove(event) {
            if (controls.rotateLeft) {
                camera.rotation.y -= event.movementX * 0.01;
            }
            if (controls.rotateUp) {
                camera.rotation.x -= event.movementY * 0.01;
            }
        }

        function onMouseUp() {
            controls.rotateLeft = false;
            controls.rotateUp = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.01;
        }

        function onClick(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(objects.map(obj => obj.mesh));
            if (intersects.length > 0) {
                const object = intersects[0].object;
                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip';
                tooltip.style.left = event.clientX + 'px';
                tooltip.style.top = event.clientY + 'px';
                tooltip.textContent = objects.find(obj => obj.mesh === object).label;
                document.body.appendChild(tooltip);

                if (selectedObject) {
                    document.body.removeChild(selectedObject.tooltip);
                }
                selectedObject = { object, tooltip };
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            objects.forEach(obj => {
                obj.mesh.rotation.x += 0.005;
                obj.mesh.rotation.y += 0.005;
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
